name: Build and Release Custom Geo Data

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      # ========== СБОРКА geosite.dat ==========
      - name: Clone v2fly/domain-list-community
        run: git clone https://github.com/v2fly/domain-list-community.git

      - name: Copy custom data for geosite
        run: |
          rm -rf domain-list-community/data/*
          cp data/ru-all data/ads data/torrent domain-list-community/data/

      - name: Build geosite.dat
        run: |
          cd domain-list-community
          go run ./ -outputname geosite.dat ru-all ads torrent
          cd ..
          cp domain-list-community/geosite.dat .

      # ========== СБОРКА geoip.dat (кастомный) ==========
      - name: Clone and build geoip CLI from Loyalsoldier
        run: |
          # Удаляем старую папку, если она осталась
          rm -rf geoip
          git clone https://github.com/Loyalsoldier/geoip.git
          cd geoip
          go build -v -o geoip ./
          cd ..
          cp geoip/geoip geoip-cli
          chmod +x geoip-cli

      - name: Convert custom IPs and ranges to CIDR (bash)
        run: |
          > custom-cidr.txt
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            if [[ "$line" == *"/"* ]]; then
              echo "$line" >> custom-cidr.txt
            elif [[ "$line" == *"-"* ]]; then
              start=$(echo "$line" | cut -d- -f1)
              end=$(echo "$line" | cut -d- -f2)
              if [[ "$start" =~ \.0$ ]] && [[ "$end" =~ \.255$ ]]; then
                prefix=$(echo "$start" | sed 's/\.[0-9]*$//')
                echo "${prefix}.0/24" >> custom-cidr.txt
              else
                echo "WARNING: Unsupported range $line – please specify CIDR manually" >&2
              fi
            else
              if [[ "$line" == *":"* ]]; then
                echo "$line/128" >> custom-cidr.txt
              else
                echo "$line/32" >> custom-cidr.txt
              fi
            fi
          done < custom-ips.txt

      - name: Remove duplicates from custom-cidr.txt
        run: sort -u custom-cidr.txt -o custom-cidr.txt

      - name: Create config.json for geoip
        run: |
          cat > config.json << EOF
          {
            "input": [
              {
                "type": "maxmind",
                "url": "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-Country-CSV&suffix=zip",
                "license_key": ""
              },
              {
                "type": "file",
                "path": "custom-cidr.txt"
              }
            ],
            "output": [
              {
                "type": "v2ray",
                "path": "geoip.dat"
              }
            ]
          }
          EOF

      - name: Build geoip.dat
        run: |
          ./geoip-cli -config config.json -country RU

      # ========== ПУБЛИКАЦИЯ ==========
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daily-${{ github.run_number }}
          name: Daily Build ${{ github.run_number }}
          body: |
            Автоматическая сборка.
            - geosite.dat: собран из ru-all, ads, torrent
            - geoip.dat: собран из MaxMind + ваши кастомные IP (дубли удалены)
          files: |
            geoip.dat
            geosite.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push geoip.dat and geosite.dat to release branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan release
          git rm -rf .
          git add geoip.dat geosite.dat
          git commit -m "Update geoip.dat and geosite.dat"
          git push --force origin release