name: Build and Release Custom Geo Data

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Clone v2fly/domain-list-community
        run: git clone https://github.com/v2fly/domain-list-community.git

      - name: Copy custom data
        run: |
          rm -rf domain-list-community/data/*
          cp -r data/* domain-list-community/data/

      - name: Build geosite.dat
        run: |
          cd domain-list-community
          go run ./ -outputname geosite.dat ru-all ads torrent
          cd ..
          cp domain-list-community/geosite.dat .

      - name: Download geoip.dat
        run: |
          wget -O geoip.dat https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geoip.dat

      - name: Push geoip.dat and geosite.dat to release branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan release
          git rm -rf .
          git add geoip.dat geosite.dat
          git commit -m "Update geoip.dat and geosite.dat"
          git push --force origin release
