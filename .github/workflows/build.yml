name: Build and Release Custom Geo Data

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      # ========== СБОРКА geosite.dat ==========
      - name: Clone v2fly/domain-list-community
        run: git clone https://github.com/v2fly/domain-list-community.git

      - name: Copy custom data for geosite (only required lists)
        run: |
          rm -rf domain-list-community/data/*
          cp data/ru-all data/ads data/torrent domain-list-community/data/

      - name: Build geosite.dat
        run: |
          cd domain-list-community
          go run ./ -outputname geosite.dat ru-all ads torrent
          cd ..
          cp domain-list-community/geosite.dat .

      # ========== СБОРКА geoip.dat ==========
      - name: Download geoip-builder
        run: |
          wget -O geoip-builder https://github.com/Loyalsoldier/geoip-builder/releases/latest/download/geoip-builder-linux-amd64
          chmod +x geoip-builder

      - name: Prepare config.yaml for geoip-builder
        run: |
          cat > config.yaml << EOF
          input:
            - type: maxmind
              url: https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-Country-CSV&suffix=zip
              license_key: ""  # без ключа работает, но можно указать свой
            - type: file
              path: custom-ips.txt   # ваш файл с кастомными IP
          output:
            - type: v2ray
              path: geoip.dat
          EOF

      - name: Build geoip.dat with custom IPs
        run: |
          ./geoip-builder -config config.yaml -country RU

      # ========== ПУБЛИКАЦИЯ ==========
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daily-${{ github.run_number }}
          name: Daily Build ${{ github.run_number }}
          body: |
            Автоматическая сборка.
            - geosite.dat: собран из ru-all, ads, torrent
            - geoip.dat: собран из MaxMind + ваши кастомные IP
          files: |
            geoip.dat
            geosite.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push geoip.dat and geosite.dat to release branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan release
          git rm -rf .
          git add geoip.dat geosite.dat
          git commit -m "Update geoip.dat and geosite.dat"
          git push --force origin release