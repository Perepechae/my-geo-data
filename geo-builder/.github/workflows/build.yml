name: Build and Release Custom Geo Data

on:
  schedule:
    - cron: '30 */6 * * *'   # каждые 6 часов
  workflow_dispatch:          # кнопка для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Clone v2fly/domain-list-community
        run: git clone https://github.com/v2fly/domain-list-community.git

      - name: Copy custom data
        run: |
          rm -rf domain-list-community/data/*
          cp -r data/* domain-list-community/data/

      - name: Build geosite.dat
        run: |
          cd domain-list-community
          go run ./ -outputname geosite.dat ru-all torrent ads
          cd ..
          cp domain-list-community/geosite.dat .

      - name: Download geoip.dat from runetfreedom
        run: wget -O geoip.dat https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geoip.dat

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daily-${{ github.run_number }}
          name: Daily Build ${{ github.run_number }}
          body: |
            Автоматическая сборка от $(date +'%Y-%m-%d %H:%M:%S').
            geosite.dat собран из кастомных списков (ru-all, torrent, ads).
            geoip.dat взят из runetfreedom/russia-v2ray-rules-dat.
          files: |
            geoip.dat
            geosite.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}